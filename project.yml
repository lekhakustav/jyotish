name: Jyotish
options:
  bundleIdPrefix: com.sodhera
  deploymentTarget:
    iOS: "17.0"
targets:
  Jyotish:
    type: application
    platform: iOS
    sources: [Jyotish]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.jyotish
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: Jyotish
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO

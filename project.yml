name: Jyotish
options:
  bundleIdPrefix: com.sodhera
  deploymentTarget:
    iOS: "17.0"
targets:
  Jyotish:
    type: application
    platform: iOS
    sources: [Jyotish]
    info:
      path: Jyotish/Info.plist
      properties:
        CFBundleDisplayName: Jyotish
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSMicrophoneUsageDescription: "The microphone lets you ask Pandit-ji questions by voice."
        NSSpeechRecognitionUsageDescription: "Speech recognition turns your voice into a question for Pandit-ji."
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_OR_PUBLISHABLE_KEY: "$(SUPABASE_ANON_OR_PUBLISHABLE_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.jyotish
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO
        SUPABASE_URL: "https://ghfcssxptpazfbtiwshz.supabase.co"
        SUPABASE_ANON_OR_PUBLISHABLE_KEY: "sb_publishable_2HN-eNePLicYuxRhCKKAFw_dm74f0SW"
  JyotishTests:
    type: bundle.unit-test
    platform: iOS
    sources: [JyotishTests]
    dependencies:
      - target: Jyotish
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.jyotish.tests
        SWIFT_VERSION: "5.9"
        CODE_SIGNING_ALLOWED: NO
